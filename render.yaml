services:
  - type: web
    name: wacc-market-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MAX_COMPANY_REFRESH
        value: "0"
      - key: DEFAULT_HISTORY_YEARS
        value: "5"
      - key: NSE_BACKFILL_DAYS
        value: "30"
